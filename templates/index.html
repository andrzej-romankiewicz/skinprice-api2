<!DOCTYPE html>
<html>
<head>
    <title>SkinPrice Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: white; }
        .card { background-color: #1e1e1e; border: none; color: white; margin-bottom: 20px; }
    </style>
</head>
<body class="container py-5">
    <h1 class="mb-4">🚀 Inżynierski Dashboard Skinów</h1>

    <div class="row">
        <div class="col-md-8">
            <div class="card p-4">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <h3>Aktualne ceny</h3>
                <ul class="list-group list-group-flush">
                    {% for skin in skins %}
                    <li class="list-group-item bg-transparent text-white d-flex justify-content-between">
                        {{ skin.name }} <span>${{ skin.price }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('priceChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: {{ names|tojson }},
                datasets: [{
                    label: 'Cena w USD',
                    data: {{ prices|tojson }},
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgb(75, 192, 192)',
                    borderWidth: 1
                }]
            },
            options: { scales: { y: { beginAtZero: true, grid: { color: '#333' } } } }
        });
    </script>
</body>
</html>
