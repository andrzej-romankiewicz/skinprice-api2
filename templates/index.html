<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SkinPrice Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .skin-item { border-bottom: 1px solid #333; padding: 10px 0; }
        .price-tag { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4 shadow-lg">
                    <h1 class="text-center mb-4">🚀 Monitor Cen Skinów</h1>
                    <p class="text-muted text-center">Status systemu: <span class="badge bg-success">Online</span></p>
                    
                    <div class="mt-4">
                        {% for skin in skins %}
                        <div class="skin-item d-flex justify-content-between align-items-center">
                            <span>{{ skin.name }}</span>
                            <span class="price-tag">${{ skin.price }}</span>
                        </div>
                        {% endfor %}
                    </div>
                    
                    <div class="text-center mt-5">
                        <small class="text-muted">Projekt Inżynierski - System Analizy Rynku CS2</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
